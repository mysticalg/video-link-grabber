<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Link Grabber</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="logo" src="assets/icon32.png" alt="" />
        <div>
          <h1>Video Link Grabber</h1>
          <p class="sub">Scans only the current tab when you open this popup. No DRM bypass.</p>
        </div>
      </div>
      <button id="scanBtn" type="button" title="Scan the current page again">Rescan</button>
    </header>
    <main>
      <div id="status" role="status" aria-live="polite">Scanning...</div>
      <p id="summary" class="summary" hidden></p>
      <ul id="results"></ul>
      <template id="itemTpl">
        <li class="item">
          <div class="thumbWrap">
            <img class="thumb" alt="" />
          </div>
          <div class="meta">
            <div class="title"></div>
            <div class="details">
              <span class="badge kind"></span>
              <span class="badge type"></span>
              <span class="origin"></span>
            </div>
            <div class="from"></div>
            <div class="note" hidden></div>
            <div class="actions">
              <a class="open" target="_blank" rel="noopener noreferrer">Open link</a>
              <button class="copy" type="button">Copy link</button>
            </div>
          </div>
        </li>
      </template>
    </main>
    <footer>
      <small>Stream manifests such as `.m3u8` and `.mpd` are playlists, not single video files. Some preview images may be blocked cross-origin.</small>
    </footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
